<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tirth Rank Resume</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080914;
        --panel: rgba(16, 24, 39, 0.92);
        --line: rgba(190, 204, 255, 0.18);
        --text: #f8fbff;
        --muted: #b9c5d8;
        --teal: #38e7c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        background:
          linear-gradient(rgba(125, 211, 252, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(125, 211, 252, 0.055) 1px, transparent 1px),
          var(--bg);
        background-size: 44px 44px, 44px 44px, auto;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem clamp(1rem, 4vw, 3rem);
        border-bottom: 1px solid var(--line);
        background: rgba(8, 9, 20, 0.84);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.1rem, 2vw, 1.45rem);
      }

      a {
        min-height: 2.35rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.55rem 0.8rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
        text-decoration: none;
        font-weight: 700;
      }

      main {
        height: calc(100vh - 4.45rem);
        padding: clamp(0.75rem, 2vw, 1.25rem);
      }

      .viewer {
        width: 100%;
        height: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
        box-shadow: 0 26px 90px rgba(0, 0, 0, 0.46);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .fallback {
        padding: 1rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Tirth Rank Resume</h1>
      <a href="/">Back to portfolio</a>
    </header>
    <main>
      <div class="viewer">
        <iframe src="/resume/Tirth-Rank-Resume.pdf#toolbar=0&navpanes=0&scrollbar=1" title="Tirth Rank Resume">
          <p class="fallback">Your browser cannot display this resume viewer.</p>
        </iframe>
      </div>
    </main>
  </body>
</html>
